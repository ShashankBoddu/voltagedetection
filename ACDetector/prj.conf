# --- Core ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072


# --- UART ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=y

# --- Debug ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AC_DETECTOR"
CONFIG_BT_SETTINGS=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_ID_MAX=1
CONFIG_BT_SETTINGS_CCC_STORE_ON_WRITE=y

# --- ADC ---
CONFIG_ADC=y
CONFIG_NRFX_SAADC=y

CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y
CONFIG_BT_GATT_SERVICE_CHANGED=y

# --- Buffers (Safety Focused) ---
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=15
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=12
CONFIG_BT_BUF_ACL_TX_COUNT=5
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=5
CONFIG_BT_CONN_TX_MAX=10
CONFIG_BT_CTLR_SDC_TX_PACKET_COUNT=5
CONFIG_BT_CTLR_SDC_RX_PACKET_COUNT=5
CONFIG_BT_ATT_PREPARE_COUNT=2
CONFIG_BT_RX_STACK_SIZE=1536

# --- Native GAP Parameter Management (Apple Compliant) ---
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# --- Storage ---
CONFIG_FLASH=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- MCUmgr DFU ---
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
CONFIG_MCUMGR=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_COUNT=4
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=512
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y

# Bluetooth dependencies for DFU
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y
CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# DFU Security (Fix for "Authentication Is Insufficient" on iOS)
# CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
# CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL is disabled to favor app-level control

CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_NET_BUF=y
CONFIG_STREAM_FLASH=y
