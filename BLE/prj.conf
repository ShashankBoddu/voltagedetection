# --- Core ---
CONFIG_MAIN_STACK_SIZE=2048

# --- UART ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y


# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AC_DETECTOR"

# --- Save flash/RAM ---
CONFIG_BT_SMP=n
CONFIG_BT_SETTINGS=n
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_EXT_ADV=n
CONFIG_BT_PRIVACY=n
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_DF=n

# Increase MTU (optional but recommended)
# CONFIG_BT_L2CAP_TX_MTU=247
# CONFIG_BT_BUF_ACL_RX_SIZE=251
# CONFIG_BT_BUF_ACL_TX_SIZE=251

# --- Save flash/RAM ---
CONFIG_BT_SMP=n
CONFIG_BT_SETTINGS=n
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_EXT_ADV=n
CONFIG_BT_PRIVACY=n
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_DF=n
